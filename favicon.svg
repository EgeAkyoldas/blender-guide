<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cc4e0d;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="220" height="220" fill="#0d0d0f"/>
  <g transform="translate(110,110) scale(0.8)">
    <g style="transform-style:preserve-3d">
      <!-- Front face (G) -->
      <rect x="-55" y="-55" width="110" height="110" fill="url(#grad)" stroke="#FF6B1A" stroke-width="2" opacity="0.9"/>
      <text x="0" y="25" font-family="JetBrains Mono, monospace" font-size="60" font-weight="700" fill="#0d0d0f" text-anchor="middle" dominant-baseline="middle">G</text>
      
      <!-- Right face (S) -->
      <rect x="55" y="-55" width="110" height="110" fill="url(#grad)" stroke="#FF6B1A" stroke-width="2" opacity="0.7"/>
      <text x="110" y="25" font-family="JetBrains Mono, monospace" font-size="60" font-weight="700" fill="#0d0d0f" text-anchor="middle" dominant-baseline="middle">S</text>
    </g>
  </g>
  <circle cx="110" cy="110" r="100" fill="none" stroke="#FF6B1A" stroke-width="1" opacity="0.3"/>
</svg>
