# Netlify deployment konfigürasyonu

[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# chat fonksiyonu persona.yaml'ı bundle'a dahil eder
[functions.chat]
  included_files = ["persona.yaml"]

# Temiz URL için rewrite: /api/chat → fonksiyon
# (chat.mjs içindeki config.path zaten bunu yapıyor ama yedek)
[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

# Güvenlik header'ları
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
